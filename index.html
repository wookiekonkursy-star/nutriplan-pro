function calcTotals(items) {
  const t = {};
  ALL_NUTRIENTS.forEach(n => { t[n.key] = 0; });
  items.forEach(({ food, grams }) => {
    ALL_NUTRIENTS.forEach(n => { t[n.key] += (food.per100g[n.key] || 0) * grams / 100; });
  });
  return t;
}

function NutrientBar({ label, value, rda, unit, color, isWarning, isPriority }) {
  const pct = rda ? Math.min(150, (value / rda) * 100) : 0;
  const over = rda && value > rda * 1.0;
  const danger = rda && value > rda * 1.2;
  return (
    <div style={{ marginBottom: 6 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 2 }}>
        <span style={{ display: "flex", alignItems: "center", gap: 4, color: isWarning && danger ? "#ef4444" : isPriority ? "#fbbf24" : "#94a3b8" }}>
          {isWarning && danger ? "🚨" : isPriority ? "⭐" : ""}
          {label}
        </span>
        <span style={{ fontWeight: 700, color: danger ? "#ef4444" : over ? "#f97316" : "#e2e8f0" }}>
          {value.toFixed(1)} / {rda} {unit}
        </span>
      </div>
      <div style={{ height: 5, background: "#21262d", borderRadius: 3, overflow: "hidden" }}>
        <div style={{
          height: "100%", borderRadius: 3, transition: "width 0.4s ease",
          width: `${pct}%`,
          background: danger ? "linear-gradient(90deg,#ef4444,#dc2626)" : over ? "linear-gradient(90deg,#f97316,#ea580c)" : color
        }} />
      </div>
    </div>
  );
}

function MealSlot({ name, items, onAdd, onRemove, gInput, setGInput, search, setSearch, catFilter, setCatFilter, filteredFoods, profile, targetKcal, targetProtein, onApplyAI, dietGoalLabel, lifestyleLabel, activityLabel }) {
  const totals = useMemo(() => calcTotals(items), [items]);
  const avoided = profile?.avoidFoods || [];

  const [aiPrompt, setAiPrompt] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const [aiError, setAiError] = useState(null);
  const [showAI, setShowAI] = useState(false);
  const [showPrep, setShowPrep] = useState(false);

  const kcalOk = targetKcal > 0 && Math.abs(totals.kcal - targetKcal) / targetKcal <= 0.10;
  const kcalOver = totals.kcal > targetKcal * 1.10;
  const proteinOk = targetProtein > 0 && totals.protein >= targetProtein * 0.9;

  const foodListForAI = FOODS.map(f => ({
    id: f.id, name: f.name, category: f.category,
    kcal: f.per100g.kcal, protein: f.per100g.protein,
    fat: f.per100g.fat, carbs: f.per100g.carbs,
    sodium: f.per100g.sodium, potassium: f.per100g.potassium,
    phosphorus: f.per100g.phosphorus, sugar: f.per100g.sugar
  }));

  const handleAIGenerate = async () => {
    if (!aiPrompt.trim()) return;
    setAiLoading(true);
    setAiError(null);
    setAiResult(null);

    const avoidedFoodNames = (profile.avoidFoods || []).map(id => FOODS.find(f=>f.id===id)?.name).filter(Boolean);
    const avoidNutrients = profile.avoid || [];
    const prioritizeNutrients = profile.prioritize || [];
    const warningLimits = Object.entries(profile.warningNutrients || {}).map(([k,v]) => `${v.label} max ${v.max}`).join(", ");

    const systemPrompt = `Jesteś doświadczonym dietetykiem klinicznym. Planujesz posiłek WYŁĄCZNIE z podanej bazy produktów.

BAZA PRODUKTÓW (JSON):
${JSON.stringify(foodListForAI)}

BEZWZGLĘDNE WYMAGANIA ŻYWIENIOWE:
1. Suma kcal posiłku MUSI być dokładnie w zakresie ±5% od wartości docelowej. To jest wymóg KRYTYCZNY – sprawdź obliczenia przed odpowiedzią.
2. Białko w posiłku MUSI osiągnąć lub przekroczyć cel białkowy dla tego posiłku. To jest wymóg KRYTYCZNY.
3. Wybieraj WYŁĄCZNIE produkty z bazy – używaj dokładnych id.
4. Gramatura realistyczna (30–400g na składnik).
5. Produkty z listy wykluczeń są ABSOLUTNIE zabronione.

WERYFIKACJA PRZED ODPOWIEDZIĄ:
- Oblicz: suma(kcal_i * gramy_i / 100) → musi być w zakresie docelowym ±5%
- Oblicz: suma(białko_i * gramy_i / 100) → musi być ≥ cel białkowy
- Jeśli nie spełnia wymagań – dostosuj gramaturę lub dodaj składnik białkowy

INSTRUKCJA PRZYGOTOWANIA:
- Napisz jasne, praktyczne kroki gotowania (4-7 kroków)
- Uwzględnij: przygotowanie, obróbkę termiczną, przyprawy, podanie
- Podaj szacowany czas przygotowania

FORMAT ODPOWIEDZI (tylko JSON, zero tekstu poza nim):
{
  "mealName": "Nazwa posiłku",
  "description": "Krótki opis (1-2 zdania)",
  "rationale": "Uzasadnienie dietetyczne – kcal i białko względem celów",
  "prepTime": "15 minut",
  "items": [
    { "foodId": 1, "grams": 150, "reason": "uzasadnienie" }
  ],
  "preparation": [
    "Krok 1: ...",
    "Krok 2: ...",
    "Krok 3: ..."
  ]
}`;

    const userMsg = `Zaplanuj posiłek "${name}" dla pacjenta.

PROFIL KLINICZNY: ${profile.label}
PREFERENCJE: ${aiPrompt}

WYMOGI KALORYCZNE I BIAŁKOWE (KRYTYCZNE):
- Docelowa kaloryczność: DOKŁADNIE ${targetKcal} kcal (±5% = zakres ${Math.round(targetKcal*0.95)}–${Math.round(targetKcal*1.05)} kcal)
- Minimalne białko w posiłku: ${targetProtein}g (wymóg 1,5g/kg masy ciała rozłożony proporcjonalnie)

KONTEKST DIETY:
- Cel diety: ${dietGoalLabel || "nie określono"}
- Tryb życia: ${lifestyleLabel || "nie określono"}  
- Aktywność: ${activityLabel || "nie określono"}
- Priorytety żywieniowe: ${prioritizeNutrients.join(", ") || "brak"}
- Unikane składniki odżywcze: ${avoidNutrients.join(", ") || "brak"}
- Limity bezpieczeństwa: ${warningLimits || "standardowe"}
- Produkty wykluczone z diety: ${avoidedFoodNames.join(", ") || "brak"}

PAMIĘTAJ: Najpierw sprawdź obliczenia – suma kcal musi być w zakresie ${Math.round(targetKcal*0.95)}–${Math.round(targetKcal*1.05)}, białko ≥ ${targetProtein}g.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: "user", content: userMsg }]
        })
      });
      const data = await response.json();
      const text = data.content?.map(c => c.text || "").join("") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      const enriched = (parsed.items || []).map(item => {
        const food = FOODS.find(f => f.id === item.foodId);
        if (!food) return null;
        return { ...item, food };
      }).filter(Boolean);

      setAiResult({ ...parsed, items: enriched });
      setShowPrep(false);
    } catch (err) {
      setAiError("Błąd generowania. Spróbuj ponownie.");
    } finally {
      setAiLoading(false);
    }
  };

  const handleApply = () => {
    if (!aiResult) return;
    aiResult.items.forEach(({ food, grams }) => { onApplyAI(food, grams); });
    setAiResult(null);
    setAiPrompt("");
    setShowAI(false);
  };

  return (
    <div style={{ background: "#161b22", border: `1px solid ${kcalOver ? "#ef444444" : items.length > 0 && kcalOk ? "#22c55e44" : "#21262d"}`, borderRadius: 14, overflow: "hidden", transition: "border-color 0.3s" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1a1f2e, #161b22)", padding: "12px 16px", borderBottom: "1px solid #21262d", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 14, color: "#f1f5f9" }}>{name}</div>
          <div style={{ fontSize: 11, color: "#64748b", display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            <span>{items.length} prod.</span>
            <span style={{ color: kcalOver ? "#ef4444" : items.length > 0 && kcalOk ? "#22c55e" : "#64748b", fontWeight: items.length > 0 ? 700 : 400 }}>
              {totals.kcal.toFixed(0)}/{targetKcal} kcal {items.length > 0 && (kcalOk ? "✓" : kcalOver ? "↑" : "…")}
            </span>
            {targetProtein > 0 && <span style={{ color: items.length > 0 && proteinOk ? "#60a5fa" : "#64748b", fontWeight: items.length > 0 ? 700 : 400 }}>
              B: {totals.protein.toFixed(0)}/{targetProtein}g {items.length > 0 && (proteinOk ? "✓" : "↓")}
            </span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 5, alignItems:"center", flexWrap:"wrap", justifyContent:"flex-end" }}>
          {[{l:"T", v: totals.fat, c:"#facc15"},{l:"W", v: totals.carbs, c:"#4ade80"}].map(m=>
            <span key={m.l} style={{fontSize:10, fontWeight:700, padding:"2px 6px", borderRadius:5, background:`rgba(0,0,0,0.3)`, color: m.c}}>{m.l}: {m.v.toFixed(0)}g</span>
          )}
          <button onClick={()=>setShowAI(v=>!v)} style={{
            padding:"4px 10px", borderRadius:7, border:`1px solid ${showAI ? "#a78bfa" : "#30363d"}`,
            background: showAI ? "rgba(167,139,250,0.15)" : "#0d1117",
            color: showAI ? "#a78bfa" : "#64748b", fontSize:10, fontWeight:700, cursor:"pointer"
          }}>✨ AI</button>
        </div>
      </div>

      {/* Calorie + Protein progress bars */}
      <div style={{ padding:"8px 14px 0", display:"flex", flexDirection:"column", gap:4 }}>
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:"#475569", marginBottom:2 }}>
            <span>Kalorie</span>
            <span style={{ color: kcalOver ? "#ef4444" : kcalOk && items.length > 0 ? "#22c55e" : "#475569" }}>
              {totals.kcal.toFixed(0)} / {targetKcal} kcal ({targetKcal > 0 ? Math.round(totals.kcal/targetKcal*100) : 0}%)
            </span>
          </div>
          <div style={{ height:4, background:"#21262d", borderRadius:2, overflow:"hidden" }}>
            <div style={{ height:"100%", borderRadius:2, transition:"width 0.3s",
              width:`${targetKcal > 0 ? Math.min(110, totals.kcal/targetKcal*100) : 0}%`,
              background: kcalOver ? "linear-gradient(90deg,#ef4444,#dc2626)" : kcalOk && items.length > 0 ? "linear-gradient(90deg,#22c55e,#16a34a)" : "#374151"
            }} />
          </div>
        </div>
        {targetProtein > 0 && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:"#475569", marginBottom:2 }}>
              <span>Białko (min. {targetProtein}g)</span>
              <span style={{ color: proteinOk && items.length > 0 ? "#60a5fa" : "#ef4444" }}>
                {totals.protein.toFixed(1)}g ({targetProtein > 0 ? Math.round(totals.protein/targetProtein*100) : 0}%)
              </span>
            </div>
            <div style={{ height:4, background:"#21262d", borderRadius:2, overflow:"hidden" }}>
              <div style={{ height:"100%", borderRadius:2, transition:"width 0.3s",
                width:`${targetProtein > 0 ? Math.min(100, totals.protein/targetProtein*100) : 0}%`,

        <div style={{ padding:"12px 14px 0", borderBottom:"1px solid #21262d", background:"rgba(167,139,250,0.04)", marginTop:8 }}>

                <span>✨</span> Generuj posiłek z AI
                <span style={{ fontSize:9, color:"#64748b", fontWeight:400 }}>
                  · {targetKcal} kcal · min. {targetProtein}g białka
                </span>
              </div>
              <div style={{ display:"flex", gap:6, marginBottom:6, flexWrap:"wrap" }}>
                <span style={{ fontSize:9, padding:"2px 7px", borderRadius:5, background:"rgba(239,68,68,0.12)", color:"#f87171", fontWeight:600 }}>🎯 {targetKcal} kcal ±5%</span>

                placeholder={`Preferencje pacjenta... np. "lubi ryby, nie lubi brokułów"`}
                rows={2}
                style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:"1px solid #30363d", background:"#0d1117", color:"#e2e8f0", fontSize:12, outline:"none", resize:"vertical", lineHeight:1.5 }}
              />
            </div>
            <button onClick={handleAIGenerate} disabled={aiLoading || !aiPrompt.trim()} style={{
              marginTop:36, padding:"8px 12px", borderRadius:8, border:"none", cursor: aiLoading || !aiPrompt.trim() ? "default" : "pointer",
              background: aiLoading || !aiPrompt.trim() ? "#21262d" : "linear-gradient(135deg,#7c3aed,#6d28d9)",
              color: aiLoading || !aiPrompt.trim() ? "#475569" : "#fff", fontWeight:700, fontSize:12, whiteSpace:"nowrap"
            }}>
              {aiLoading ? "⏳ …" : "🚀 Generuj"}
            </button>
          </div>

          {aiError && (
            <div style={{ fontSize:11, color:"#f87171", padding:"6px 10px", background:"rgba(239,68,68,0.1)", borderRadius:7, marginBottom:10 }}>{aiError}</div>
          )}

          {aiLoading && (
            <div style={{ padding:"16px", textAlign:"center", marginBottom:10 }}>
              <div style={{ fontSize:12, color:"#a78bfa", marginBottom:4 }}>🤖 AI komponuje posiłek…</div>
              <div style={{ fontSize:10, color:"#475569", marginBottom:8 }}>Weryfikacja kaloryki i białka…</div>
              <div style={{ height:3, background:"#21262d", borderRadius:2, overflow:"hidden" }}>
                <div style={{ height:"100%", width:"60%", background:"linear-gradient(90deg,#7c3aed,#a78bfa)", borderRadius:2, animation:"slide 1.2s infinite" }} />
              </div>
            </div>
          )}

          {aiResult && (
            <div style={{ background:"#0d1117", borderRadius:10, padding:"14px", marginBottom:12, border:"1px solid #30363d" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
                <div style={{ fontWeight:800, fontSize:14, color:"#f1f5f9" }}>🍽 {aiResult.mealName}</div>
                {aiResult.prepTime && <span style={{ fontSize:10, color:"#64748b", background:"#161b22", padding:"2px 8px", borderRadius:6, flexShrink:0 }}>⏱ {aiResult.prepTime}</span>}
              </div>
              <div style={{ fontSize:11, color:"#94a3b8", marginBottom:8, lineHeight:1.5 }}>{aiResult.description}</div>
              <div style={{ fontSize:11, color:"#a78bfa", marginBottom:12, background:"rgba(167,139,250,0.08)", borderRadius:7, padding:"7px 10px", borderLeft:"3px solid #7c3aed" }}>
                💡 {aiResult.rationale}
              </div>

              {/* Proposed items */}
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:10, color:"#64748b", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:6 }}>Składniki</div>
                {aiResult.items.map(({food, grams, reason}, idx) => {
                  const kcalItem = (food.per100g.kcal * grams / 100).toFixed(0);
                  const proteinItem = (food.per100g.protein * grams / 100).toFixed(1);
                  return (
                    <div key={idx} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 8px", borderRadius:8, marginBottom:4, background:"rgba(255,255,255,0.02)", border:"1px solid #21262d" }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:12, color:"#e2e8f0", fontWeight:600 }}>{food.name}</div>
                        <div style={{ fontSize:10, color:"#475569" }}>{reason}</div>
                      </div>
                      <div style={{ textAlign:"right", flexShrink:0 }}>
                        <div style={{ fontSize:12, fontWeight:700, color:"#f97316" }}>{grams}g</div>
                        <div style={{ fontSize:10, color:"#64748b" }}>{kcalItem} kcal · B:{proteinItem}g</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Totals check */}
              {(() => {
                const preview = calcTotals(aiResult.items.map(({food,grams})=>({food,grams})));
                const kOk = Math.abs(preview.kcal - targetKcal) / targetKcal <= 0.05;
                const pOk = preview.protein >= targetProtein * 0.9;
                return (
                  <div style={{ background:"rgba(0,0,0,0.3)", borderRadius:8, padding:"8px 10px", marginBottom:10 }}>
                    <div style={{ fontSize:10, color:"#64748b", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:6 }}>Weryfikacja wymagań</div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      <span style={{ fontSize:11, fontWeight:700, padding:"3px 8px", borderRadius:5, background: kOk ? "rgba(34,197,94,0.15)" : "rgba(239,68,68,0.15)", color: kOk ? "#4ade80" : "#f87171" }}>
                        {kOk ? "✓" : "⚠"} {preview.kcal.toFixed(0)} / {targetKcal} kcal
                      </span>
                      <span style={{ fontSize:11, fontWeight:700, padding:"3px 8px", borderRadius:5, background: pOk ? "rgba(59,130,246,0.15)" : "rgba(239,68,68,0.15)", color: pOk ? "#93c5fd" : "#f87171" }}>
                        {pOk ? "✓" : "⚠"} {preview.protein.toFixed(1)}g / min.{targetProtein}g białka
                      </span>
                      <span style={{ fontSize:11, padding:"3px 8px", borderRadius:5, background:"rgba(250,204,21,0.1)", color:"#facc15" }}>T: {preview.fat.toFixed(1)}g</span>
                      <span style={{ fontSize:11, padding:"3px 8px", borderRadius:5, background:"rgba(74,222,128,0.1)", color:"#4ade80" }}>W: {preview.carbs.toFixed(1)}g</span>
                    </div>
                  </div>
                );
              })()}

              {/* Preparation steps */}
              {aiResult.preparation && aiResult.preparation.length > 0 && (
                <div style={{ marginBottom:10 }}>
                  <button onClick={()=>setShowPrep(v=>!v)} style={{
                    width:"100%", padding:"7px 10px", borderRadius:8, border:`1px solid ${showPrep ? "#f97316" : "#30363d"}`,
                    background: showPrep ? "rgba(249,115,22,0.08)" : "transparent",
                    color: showPrep ? "#f97316" : "#64748b", fontSize:11, fontWeight:700, cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"space-between"
                  }}>
                    <span>👨‍🍳 Sposób przygotowania</span>
                    <span>{showPrep ? "▲ Zwiń" : "▼ Rozwiń"}</span>
                  </button>
                  {showPrep && (
                    <div style={{ marginTop:8, background:"rgba(249,115,22,0.05)", borderRadius:8, padding:"10px 12px", border:"1px solid rgba(249,115,22,0.2)" }}>
                      <ol style={{ margin:0, paddingLeft:18, display:"flex", flexDirection:"column", gap:8 }}>
                        {aiResult.preparation.map((step, i) => (
                          <li key={i} style={{ fontSize:12, color:"#cbd5e1", lineHeight:1.6 }}>
                            {step.replace(/^Krok \d+:\s*/i, "")}
                          </li>
                        ))}
                      </ol>
                    </div>
                  )}
                </div>
              )}

              <div style={{ display:"flex", gap:8 }}>
                <button onClick={handleApply} style={{ flex:1, padding:"9px", borderRadius:8, border:"none", background:"linear-gradient(135deg,#22c55e,#16a34a)", color:"#fff", fontWeight:700, fontSize:12, cursor:"pointer" }}>
                  ✓ Zastosuj posiłek
                </button>
                <button onClick={()=>setAiResult(null)} style={{ padding:"9px 12px", borderRadius:8, border:"1px solid #30363d", background:"transparent", color:"#64748b", fontSize:12, cursor:"pointer" }}>
                  ✕
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      <div style={{ padding: "12px 14px" }}>
        {/* Product selector */}
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Szukaj produktu..."
            style={{ flex:1, padding:"7px 10px", borderRadius:8, border:"1px solid #30363d", background:"#0d1117", color:"#e2e8f0", fontSize:12, outline:"none", fontFamily:"inherit" }} />
        </div>
        <div style={{ maxHeight: 130, overflowY: "auto", marginBottom: 8 }}>
          {filteredFoods.slice(0,20).map(food => {
            const isAvoided = avoided.includes(food.id);
            return (
              <div key={food.id} style={{ display:"flex", alignItems:"center", gap:6, padding:"4px 6px", borderRadius:7, marginBottom:2, background: isAvoided ? "rgba(239,68,68,0.05)" : "transparent", border: isAvoided ? "1px solid rgba(239,68,68,0.2)" : "1px solid transparent" }}>
                <span style={{ flex:1, fontSize:12, color: isAvoided ? "#f87171" : "#e2e8f0" }}>
                  {isAvoided ? "🚫 " : ""}{food.name}
                  <span style={{ fontSize:10, color:"#475569", marginLeft:4 }}>{food.per100g.kcal}kcal</span>
                </span>
                <input value={gInput[food.id]||""} onChange={e=>setGInput(p=>({...p,[food.id]:e.target.value}))}
                  placeholder="g" type="number"
                  style={{ width:46, padding:"3px 6px", borderRadius:6, border:"1px solid #30363d", background:"#0d1117", color:"#e2e8f0", fontSize:11, outline:"none" }} />
                <button onClick={()=>onAdd(food)} style={{ padding:"3px 9px", borderRadius:6, border:"none", background: isAvoided ? "#7f1d1d" : "linear-gradient(135deg,#22c55e,#16a34a)", color:"#fff", fontSize:11, fontWeight:700, cursor:"pointer" }}>+</button>
              </div>
            );
          })}
        </div>
        {/* Added items */}
        {items.length > 0 && (
          <div style={{ borderTop:"1px solid #21262d", paddingTop:8 }}>
            {items.map(({food, grams})=>(
              <div key={food.id} style={{ display:"flex", alignItems:"center", gap:6, padding:"3px 4px", borderRadius:6, marginBottom:2, background:"rgba(255,255,255,0.02)" }}>
                <span style={{ flex:1, fontSize:11, color:"#cbd5e1" }}>{food.name}</span>
                <span style={{ fontSize:11, color:"#64748b" }}>{grams}g</span>
                <button onClick={()=>onRemove(food.id)} style={{ padding:"1px 6px", borderRadius:5, border:"none", background:"rgba(239,68,68,0.2)", color:"#f87171", fontSize:11, cursor:"pointer" }}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("setup"); // setup | plan | report
  const [patientName, setPatientName] = useState("");
  const [profileId, setProfileId] = useState("healthy");
  const [mealCount, setMealCount] = useState(3);
  const DEFAULT_DIST = { 3: [30, 45, 25], 4: [25, 15, 40, 20] };
  const [caloricDist, setCaloricDist] = useState({ 3: [30, 45, 25], 4: [25, 15, 40, 20] });
  const [editingDist, setEditingDist] = useState(false);
  const [age, setAge] = useState("");
  const [weight, setWeight] = useState("");
  const [height, setHeight] = useState("");
  const [sex, setSex] = useState("female");

  // New: lifestyle & goals
  const [activityLevel, setActivityLevel] = useState("moderate");
  const [dietGoal, setDietGoal] = useState("health");
  const [lifestyle, setLifestyle] = useState("office");
  const [customKcal, setCustomKcal] = useState(null); // null = use suggested
  const [editingKcal, setEditingKcal] = useState(false);
  const [kcalInputVal, setKcalInputVal] = useState("");

  // meals: array of arrays of {food, grams}
  const [meals, setMeals] = useState(Array(4).fill(null).map(()=>[]));
  const [searches, setSearches] = useState(Array(4).fill(""));
  const [gInputs, setGInputs] = useState(Array(4).fill(null).map(()=>({})));
  const [catFilters, setCatFilters] = useState(Array(4).fill("Wszystkie"));
  const [reportTab, setReportTab] = useState("Makro");

  const profile = PATIENT_PROFILES[profileId];
  const mealNames = mealCount === 3 ? MEAL_NAMES_3 : MEAL_NAMES_4;

  const activeMeals = meals.slice(0, mealCount);

  const dayTotals = useMemo(() => {
    const all = activeMeals.flat();
    return calcTotals(all);
  }, [activeMeals]);

  const activeWarnings = useMemo(() => {
    if (!profile.warningNutrients) return [];
    return Object.entries(profile.warningNutrients)
      .filter(([key, {max}]) => dayTotals[key] > max)
      .map(([key, {max, label}]) => ({ key, max, label, value: dayTotals[key] }));
  }, [dayTotals, profile]);

  const getFilteredFoods = (mealIdx) => {
    const s = searches[mealIdx].toLowerCase();
    const cat = catFilters[mealIdx];
    return FOODS.filter(f =>
      (cat === "Wszystkie" || f.category === cat) &&
      f.name.toLowerCase().includes(s)
    );
  };

  const addToMeal = (mealIdx, food) => {
    const g = parseFloat(gInputs[mealIdx][food.id] || 100);
    if (!g || g <= 0) return;
    setMeals(prev => prev.map((m,i) => {
      if (i !== mealIdx) return m;
      const ex = m.find(x => x.food.id === food.id);
      if (ex) return m.map(x => x.food.id === food.id ? {...x, grams: x.grams + g} : x);
      return [...m, { food, grams: g }];
    }));
    setGInputs(prev => prev.map((g2,i) => i !== mealIdx ? g2 : {...g2, [food.id]: ""}));
  };

  const removeFromMeal = (mealIdx, foodId) => {
    setMeals(prev => prev.map((m,i) => i !== mealIdx ? m : m.filter(x => x.food.id !== foodId)));
  };

  const addToMealDirect = (mealIdx, food, grams) => {
    setMeals(prev => prev.map((m,i) => {
      if (i !== mealIdx) return m;
      const ex = m.find(x => x.food.id === food.id);
      if (ex) return m.map(x => x.food.id === food.id ? {...x, grams: x.grams + grams} : x);
      return [...m, { food, grams }];
    }));
  };

  const ACTIVITY_FACTORS = {
    sedentary:  { label: "Bardzo niska (PAL 1.2)",  pal: 1.2,    desc: "Brak ćwiczeń, praca siedząca" },
    light:      { label: "Niska (PAL 1.375)",        pal: 1.375,  desc: "Lekkie ćwiczenia 1–3×/tydz." },
    moderate:   { label: "Umiarkowana (PAL 1.55)",   pal: 1.55,   desc: "Ćwiczenia 3–5×/tydz." },
    active:     { label: "Wysoka (PAL 1.725)",        pal: 1.725,  desc: "Intensywne ćwiczenia 6–7×/tydz." },
    veryactive: { label: "Bardzo wysoka (PAL 1.9)",  pal: 1.9,    desc: "Trening 2× dziennie, praca fizyczna" },
  };
  const DIET_GOAL_MODIFIERS = {
    reduction:  { label: "Redukcja masy ciała", modifier: -500, color: "#f97316", icon: "📉", desc: "Deficyt ~500 kcal/d · ~0,5 kg/tyg." },
    mildreduct: { label: "Łagodna redukcja",    modifier: -250, color: "#fb923c", icon: "📊", desc: "Deficyt ~250 kcal/d · ~0,25 kg/tyg." },
    maintain:   { label: "Utrzymanie masy",     modifier:    0, color: "#22c55e", icon: "⚖️",  desc: "Zbilansowana kaloryka" },
    health:     { label: "Poprawa zdrowia",     modifier:    0, color: "#06b6d4", icon: "💊", desc: "Zbilansowana dieta, fokus na mikroskładniki" },
    mildgain:   { label: "Łagodna masa",        modifier: +250, color: "#a78bfa", icon: "📈", desc: "Nadwyżka ~250 kcal/d · +0,25 kg/tyg." },
    mass:       { label: "Budowanie masy",      modifier: +500, color: "#8b5cf6", icon: "💪", desc: "Nadwyżka ~500 kcal/d · +0,5 kg/tyg." },
  };
  const LIFESTYLE_OPTIONS = {
    office:    { label: "Praca biurowa/siedząca", icon: "💼" },
    mixed:     { label: "Praca mieszana",          icon: "🚶" },
    physical:  { label: "Praca fizyczna",          icon: "🏗️" },
    student:   { label: "Student",                 icon: "📚" },
    retired:   { label: "Emeryt/Rencista",         icon: "🏡" },
    athlete:   { label: "Sportowiec/Trenujący",    icon: "🏃" },
  };

  const bmr = useMemo(() => {
    if (!age || !weight || !height) return null;
    const w = parseFloat(weight), h = parseFloat(height), a = parseFloat(age);
    if (isNaN(w)||isNaN(h)||isNaN(a)) return null;
    return sex === "male" ? (10*w + 6.25*h - 5*a + 5) : (10*w + 6.25*h - 5*a - 161);
  }, [age, weight, height, sex]);

  const suggestedKcal = useMemo(() => {
    if (!bmr) return profile.rrdi.kcal;
    const pal = ACTIVITY_FACTORS[activityLevel].pal;
    const goalMod = DIET_GOAL_MODIFIERS[dietGoal].modifier;
    return Math.max(1200, Math.round(bmr * pal + goalMod));
  }, [bmr, activityLevel, dietGoal, profile]);

  const targetKcalDay = customKcal !== null ? customKcal : suggestedKcal;

  // Protein target: 1.5g per kg body weight (if weight known), distributed proportionally per meal
  const totalProteinTarget = useMemo(() => {
    const w = parseFloat(weight);
    if (!isNaN(w) && w > 0) return Math.round(w * 1.5);
    return null;
  }, [weight]);

  const S = { // styles helper
    page: { background:"#0d1117", minHeight:"100vh", color:"#e2e8f0", fontFamily:"'DM Sans', sans-serif" },
    card: { background:"#161b22", border:"1px solid #21262d", borderRadius:14 },
  };

  return (
    <div style={S.page}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
      <style>{`
        * { box-sizing:border-box; margin:0; padding:0; }
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:#161b22; }
        ::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }
        input,select,button { font-family:'DM Sans',sans-serif; }
        .nav-btn { transition: all 0.18s; }
        .nav-btn:hover { opacity:0.85; }
        .profile-card { transition: all 0.18s; cursor:pointer; }
        .profile-card:hover { transform:translateY(-2px); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
        @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
      `}</style>

      {/* ── HEADER ── */}
      <div style={{ background:"linear-gradient(135deg,#1a1f2e,#161b22)", borderBottom:"1px solid #21262d", padding:"0 20px" }}>
        <div style={{ maxWidth:1200, margin:"0 auto", padding:"14px 0", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:38, height:38, borderRadius:11, background:"linear-gradient(135deg,#22c55e,#16a34a)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>🥗</div>
            <div>
              <div style={{ fontWeight:800, fontSize:18, color:"#f1f5f9", letterSpacing:"-0.3px" }}>NutriPlan Pro</div>
              <div style={{ fontSize:10, color:"#64748b", fontWeight:500 }}>Kliniczny planista diety</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:6 }}>
            {[["setup","⚙️ Pacjent"],["plan","🍽 Plan diety"],["report","📊 Raport"]].map(([v,l])=>(
              <button key={v} className="nav-btn" onClick={()=>setPage(v)} style={{
                padding:"8px 16px", borderRadius:8, border:"none", cursor:"pointer", fontWeight:600, fontSize:12,
                background: page===v ? `linear-gradient(135deg,${profile.color},${profile.color}cc)` : "#21262d",
                color: page===v ? "#fff" : "#8b949e"
              }}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 16px" }}>

        {/* ══════════════════ PAGE: SETUP ══════════════════ */}
        {page === "setup" && (
          <div className="fade-in">
            <div style={{ marginBottom:24 }}>
              <div style={{ fontWeight:800, fontSize:24, color:"#f1f5f9", marginBottom:4 }}>Konfiguracja pacjenta</div>
              <div style={{ color:"#64748b", fontSize:13 }}>Uzupełnij dane, aby system automatycznie zaproponował kalorykę i dostosował zalecenia</div>
            </div>

            {/* ROW 1: patient data + activity/lifestyle */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:20 }}>

              {/* LEFT: Patient data */}
              <div style={{ ...S.card, padding:20 }}>
                <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", marginBottom:14, textTransform:"uppercase", letterSpacing:"0.06em" }}>Dane pacjenta</div>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  <div>
                    <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Imię / Identyfikator</label>
                    <input value={patientName} onChange={e=>setPatientName(e.target.value)} placeholder="np. Jan Kowalski"
                      style={{ width:"100%", padding:"9px 12px", borderRadius:9, border:"1px solid #30363d", background:"#0d1117", color:"#e2e8f0", fontSize:13, outline:"none" }} />
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {[
                      { label:"Wiek", value:age, setter:setAge, placeholder:"lat", type:"number" },
                      { label:"Płeć", value:sex, setter:setSex, type:"select", options:[{v:"female",l:"Kobieta"},{v:"male",l:"Mężczyzna"}] },
                      { label:"Masa (kg)", value:weight, setter:setWeight, placeholder:"kg", type:"number" },
                      { label:"Wzrost (cm)", value:height, setter:setHeight, placeholder:"cm", type:"number" },
                    ].map(f => (
                      <div key={f.label}>
                        <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>{f.label}</label>
                        {f.type === "select"
                          ? <select value={f.value} onChange={e=>f.setter(e.target.value)}
                              style={{ width:"100%", padding:"9px 12px", borderRadius:9, border:"1px solid #30363d", background:"#0d1117", color:"#e2e8f0", fontSize:13, outline:"none" }}>
                              {f.options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                            </select>
                          : <input value={f.value} onChange={e=>f.setter(e.target.value)} placeholder={f.placeholder} type={f.type}
                              style={{ width:"100%", padding:"9px 12px", borderRadius:9, border:"1px solid #30363d", background:"#0d1117", color:"#e2e8f0", fontSize:13, outline:"none" }} />
                        }
                      </div>
                    ))}
                  </div>

                  {/* BMR mini result */}
                  {bmr && (
                    <div style={{ background:"rgba(34,197,94,0.08)", border:"1px solid rgba(34,197,94,0.2)", borderRadius:9, padding:"10px 12px", display:"flex", gap:14, flexWrap:"wrap" }}>
                      {[
                        { label:"PPM (Mifflin)", value:`${Math.round(bmr)} kcal`, color:"#22c55e" },
                        { label:`CPM (PAL ${ACTIVITY_FACTORS[activityLevel].pal})`, value:`${Math.round(bmr * ACTIVITY_FACTORS[activityLevel].pal)} kcal`, color:"#4ade80" },

                      ].filter(Boolean).map(item => (

                          <div style={{ fontSize:9, color:"#86efac", textTransform:"uppercase", marginBottom:1 }}>{item.label}</div>

                    </div>

                <div style={{ ...S.card, padding:18 }}>

                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6 }}>
                    {Object.entries(LIFESTYLE_OPTIONS).map(([k,v]) => (
                      <button key={k} onClick={()=>setLifestyle(k)} style={{
                        padding:"10px 6px", borderRadius:9, border:`1px solid ${lifestyle===k ? profile.color : "#30363d"}`,

                        cursor:"pointer", textAlign:"center", transition:"all 0.15s"
                      }}>
                        <div style={{ fontSize:20, marginBottom:4 }}>{v.icon}</div>
                        <div style={{ fontSize:10, fontWeight:600, color: lifestyle===k ? profile.color : "#64748b", lineHeight:1.3 }}>{v.label}</div>
                      </button>

                  </div>
                </div>

                {/* Aktywność fizyczna */}
                <div style={{ ...S.card, padding:18 }}>
                  <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.06em" }}>Aktywność fizyczna</div>

                          cursor:"pointer", textAlign:"left", transition:"all 0.15s",
                          display:"flex", alignItems:"center", gap:10
                        }}>
                          <div style={{ width:10, height:10, borderRadius:"50%", background: isActive ? profile.color : "#374151", flexShrink:0 }} />

                            <div style={{ fontSize:12, fontWeight:600, color: isActive ? profile.color : "#94a3b8" }}>{v.label}</div>
                            <div style={{ fontSize:10, color:"#475569" }}>{v.desc}</div>
                          </div>
                          {isActive && bmr && (
                            <div style={{ fontSize:11, fontWeight:700, color: profile.color }}>

                            </div>

                        </button>

                    })}
                  </div>
                </div>
              </div>
            </div>

            {/* ROW 2: diet goal + kcal target */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:20 }}>

              {/* Diet goal */}
              <div style={{ ...S.card, padding:20 }}>
                <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", marginBottom:14, textTransform:"uppercase", letterSpacing:"0.06em" }}>Cel diety / Specyfika planu</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  {Object.entries(DIET_GOAL_MODIFIERS).map(([k,v]) => {
                    const isActive = dietGoal === k;
                    return (
                      <button key={k} onClick={()=>{ setDietGoal(k); setCustomKcal(null); }} style={{
                        padding:"12px 10px", borderRadius:10, border:`2px solid ${isActive ? v.color : "#21262d"}`,
                        background: isActive ? `${v.color}12` : "#0d1117",
                        cursor:"pointer", textAlign:"left", transition:"all 0.15s"
                      }}>
                        <div style={{ fontSize:22, marginBottom:4 }}>{v.icon}</div>
                        <div style={{ fontSize:12, fontWeight:700, color: isActive ? v.color : "#94a3b8", marginBottom:2 }}>{v.label}</div>
                        <div style={{ fontSize:10, color:"#475569", lineHeight:1.4 }}>{v.desc}</div>
                        {isActive && bmr && DIET_GOAL_MODIFIERS[k].modifier !== 0 && (
                          <div style={{ marginTop:6, fontSize:10, fontWeight:700, color: v.color }}>
                            {v.modifier > 0 ? "+" : ""}{v.modifier} kcal/d korekta
                          </div>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Caloric target */}
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>

                    {customKcal !== null && (
                      <button onClick={()=>{ setCustomKcal(null); setEditingKcal(false); }} style={{
                        fontSize:10, color:"#64748b", background:"none", border:"1px solid #30363d", borderRadius:6, padding:"3px 8px", cursor:"pointer"
                      }}>↺ Wróć do sugestii AI</button>

                    background: customKcal !== null ? "rgba(251,191,36,0.08)" : "rgba(34,197,94,0.08)",

                    <div style={{ fontSize:10, color: customKcal !== null ? "#fbbf24" : "#86efac", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:6 }}>
                      {customKcal !== null ? "✏️ Ustawione ręcznie" : "🤖 Propozycja systemu"}
                    </div>
                    <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:6 }}>
                      <span style={{ fontSize:48, fontWeight:900, color: customKcal !== null ? "#fbbf24" : "#22c55e", lineHeight:1 }}>{targetKcalDay}</span>
                      <span style={{ fontSize:15, color:"#64748b" }}>kcal / dzień</span>
                    </div>

                      <div style={{ fontSize:11, color:"#475569", lineHeight:1.7, borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:8, marginTop:4 }}>

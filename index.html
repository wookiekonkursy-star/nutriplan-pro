                        {DIET_GOAL_MODIFIERS[dietGoal].modifier !== 0 && (
                          <span style={{ color: DIET_GOAL_MODIFIERS[dietGoal].modifier < 0 ? "#f97316" : "#a78bfa" }}>
                            {" "}{DIET_GOAL_MODIFIERS[dietGoal].modifier > 0 ? "+" : ""}{DIET_GOAL_MODIFIERS[dietGoal].modifier} kcal ({DIET_GOAL_MODIFIERS[dietGoal].label})
                          </span>
                        )}
                        {customKcal !== null && (
                          <div style={{ color:"#64748b", marginTop:2 }}>
                            Różnica od sugestii: <span style={{ color: customKcal > suggestedKcal ? "#a78bfa" : "#f97316", fontWeight:700 }}>
                              {customKcal > suggestedKcal ? "+" : ""}{customKcal - suggestedKcal} kcal
                            </span>
                          </div>
                        )}
                        {!bmr && <div style={{ color:"#374151" }}>Uzupełnij dane pacjenta dla pełnej kalkulacji</div>}
                      </div>
                    )}
                  </div>

                  {/* Edit / expand section */}
                  {!editingKcal ? (
                    <button onClick={()=>{ setEditingKcal(true); setKcalInputVal(String(customKcal ?? suggestedKcal)); }} style={{
                      width:"100%", padding:"10px", borderRadius:9, border:"1px dashed #374151",
                      background:"transparent", color:"#64748b", fontSize:12, fontWeight:600, cursor:"pointer",
                      display:"flex", alignItems:"center", justifyContent:"center", gap:6
                    }}>
                      ✏️ Dostosuj kalorykę ręcznie
                    </button>
                  ) : (
                    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                      {/* Quick preset chips */}
                      {bmr && (
                        <div>
                          <div style={{ fontSize:10, color:"#475569", marginBottom:6 }}>Szybkie presety względem CPM:</div>
                          <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                            {[
                              { delta:-500, label:"−500", tag:"Mocna redukcja" },
                              { delta:-250, label:"−250", tag:"Łagodna redukcja" },
                              { delta:0,    label:"=CPM", tag:"Utrzymanie" },
                              { delta:+250, label:"+250", tag:"Łagodna masa" },
                              { delta:+500, label:"+500", tag:"Budowanie" },
                            ].map(({ delta, label, tag }) => {
                              const val = Math.max(1200, Math.round(bmr * ACTIVITY_FACTORS[activityLevel].pal) + delta);
                              const isSelected = parseInt(kcalInputVal) === val;
                              return (
                                <button key={delta} onClick={()=>setKcalInputVal(String(val))} style={{
                                  padding:"5px 10px", borderRadius:7,
                                  border:`1px solid ${isSelected ? "#fbbf24" : "#30363d"}`,
                                  background: isSelected ? "rgba(251,191,36,0.15)" : "#0d1117",
                                  cursor:"pointer", textAlign:"center"
                                }}>
                                  <div style={{ fontSize:11, fontWeight:700, color: isSelected ? "#fbbf24" : "#64748b" }}>{label}</div>
                                  <div style={{ fontSize:9, color:"#374151" }}>{val} kcal</div>
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      {/* Number input row */}
                      <div style={{ display:"flex", alignItems:"center", background:"#0d1117", borderRadius:10, border:"1px solid #fbbf2455", overflow:"hidden" }}>
                        <button onClick={()=>setKcalInputVal(v=>String(Math.max(1000, parseInt(v||0)-50)))}
                          style={{ padding:"10px 14px", border:"none", background:"transparent", color:"#94a3b8", cursor:"pointer", fontSize:18 }}>−</button>
                        <input type="number" value={kcalInputVal} onChange={e=>setKcalInputVal(e.target.value)}
                          style={{ flex:1, border:"none", background:"transparent", color:"#fbbf24", fontWeight:900, fontSize:28, textAlign:"center", outline:"none" }} />
                        <span style={{ paddingRight:10, fontSize:13, color:"#64748b", fontWeight:600 }}>kcal</span>
                        <button onClick={()=>setKcalInputVal(v=>String(Math.min(5000, parseInt(v||0)+50)))}
                          style={{ padding:"10px 14px", border:"none", background:"transparent", color:"#94a3b8", cursor:"pointer", fontSize:18 }}>+</button>
                      </div>

                      {/* Slider */}
                      <div>
                        <input type="range" min={1000} max={4500} step={50}
                          value={parseInt(kcalInputVal) || suggestedKcal}
                          onChange={e=>setKcalInputVal(e.target.value)}
                          style={{ width:"100%", accentColor:"#fbbf24", cursor:"pointer" }} />
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:"#374151", marginTop:2 }}>
                          <span>1000</span>
                          {bmr && <span style={{ color:"#22c55e55" }}>AI: {suggestedKcal}</span>}
                          <span>4500 kcal</span>
                        </div>
                      </div>

                      {/* Range context: too low warning */}
                      {parseInt(kcalInputVal) < 1200 && (
                        <div style={{ fontSize:11, color:"#f87171", background:"rgba(239,68,68,0.1)", borderRadius:7, padding:"6px 10px" }}>
                          ⚠️ Poniżej 1200 kcal — bardzo niska kaloryka, wymaga nadzoru medycznego.
                        </div>
                      )}

                      <div style={{ display:"flex", gap:8 }}>
                        <button onClick={()=>{
                          const v = parseInt(kcalInputVal);
                          if (v >= 900 && v <= 6000) setCustomKcal(v);
                          setEditingKcal(false);
                        }} style={{
                          flex:1, padding:"10px", borderRadius:9, border:"none",
                          background:"linear-gradient(135deg,#f59e0b,#d97706)", color:"#000",
                          fontWeight:800, fontSize:13, cursor:"pointer"
                        }}>✓ Zastosuj {parseInt(kcalInputVal) || "—"} kcal</button>
                        <button onClick={()=>setEditingKcal(false)} style={{
                          padding:"10px 14px", borderRadius:9, border:"1px solid #30363d",
                          background:"transparent", color:"#64748b", fontSize:12, cursor:"pointer"
                        }}>Anuluj</button>
                      </div>
                    </div>
                  )}
                </div>

                {/* Meal count + distribution */}
                <div style={{ ...S.card, padding:18 }}>
                  <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.06em" }}>Liczba posiłków</div>
                  <div style={{ display:"flex", gap:10, marginBottom:16 }}>
                    {[3,4].map(n => (
                      <button key={n} onClick={()=>setMealCount(n)} style={{
                        flex:1, padding:"14px 8px", borderRadius:10, cursor:"pointer", transition:"all 0.18s",
                        border:`2px solid ${mealCount===n ? profile.color : "#30363d"}`,
                        background: mealCount===n ? `${profile.color}15` : "#0d1117"
                      }}>
                        <div style={{ fontSize:24, marginBottom:4 }}>{n===3?"🍽":"🥘"}</div>
                        <div style={{ fontWeight:800, fontSize:18, color: mealCount===n ? profile.color : "#94a3b8" }}>{n} posiłki</div>
                        <div style={{ fontSize:10, color:"#64748b", marginTop:2 }}>
                          {n===3 ? "Śniadanie · Obiad · Kolacja" : "Śn · II Śn · Obiad · Kolacja"}
                        </div>
                      </button>
                    ))}
                  </div>

                  {/* Distribution */}
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                    <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.06em" }}>Rozkład kaloryczny</div>
                    <button onClick={()=>setEditingDist(v=>!v)} style={{
                      padding:"3px 10px", borderRadius:6,
                      border:`1px solid ${editingDist ? profile.color : "#30363d"}`,
                      background: editingDist ? `${profile.color}22` : "transparent",
                      color: editingDist ? profile.color : "#64748b", fontSize:10, fontWeight:700, cursor:"pointer"
                    }}>{editingDist ? "✓ Gotowe" : "✏️ Edytuj"}</button>
                  </div>

                  {(() => {
                    const dist = caloricDist[mealCount];
                    const names = mealCount===3 ? MEAL_NAMES_3 : MEAL_NAMES_4;
                    const total = dist.reduce((a,b)=>a+b,0);
                    const updateDist = (idx, val) => {
                      const newVal = Math.max(5, Math.min(85, parseInt(val)||5));
                      const newDist = [...dist];
                      const diff = newVal - newDist[idx];
                      newDist[idx] = newVal;
                      const othersSum = newDist.reduce((a,v,i)=>i!==idx?a+v:a,0);
                      if (othersSum > 0) newDist.forEach((v,i)=>{ if(i!==idx) newDist[i]=Math.max(5,Math.round(v - diff*(v/othersSum))); });
                      const fix = 100 - newDist.reduce((a,b)=>a+b,0);
                      const lo = newDist.map((_,i)=>i).filter(i=>i!==idx).pop();
                      if(lo!==undefined) newDist[lo]=Math.max(5,newDist[lo]+fix);
                      setCaloricDist(prev=>({...prev,[mealCount]:newDist}));
                    };
                    return (
                      <div>
                        <div style={{ display:"flex", gap:2, height:24, borderRadius:7, overflow:"hidden", marginBottom:10 }}>
                          {dist.map((p,i)=>(
                            <div key={i} style={{ flex:p, background:`${profile.color}${["ff","bb","88","55"][i]}`, display:"flex", alignItems:"center", justifyContent:"center", transition:"flex 0.3s" }}>
                              <span style={{ fontSize:9, fontWeight:800, color:"#fff", textShadow:"0 1px 2px rgba(0,0,0,0.5)" }}>{p}%</span>
                            </div>
                          ))}
                        </div>
                        {editingDist ? (
                          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                            {dist.map((p,i)=>(
                              <div key={i}>
                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                                  <span style={{ fontSize:11, color:"#cbd5e1", fontWeight:600 }}>{names[i]}</span>
                                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                    <span style={{ fontSize:10, color:"#475569" }}>~{Math.round(targetKcalDay*p/100)} kcal</span>
                                    <div style={{ display:"flex", alignItems:"center", background:"#0d1117", borderRadius:6, border:"1px solid #30363d", overflow:"hidden" }}>
                                      <button onClick={()=>updateDist(i,p-1)} style={{ padding:"2px 7px", border:"none", background:"transparent", color:"#94a3b8", cursor:"pointer", fontSize:13 }}>−</button>
                                      <input type="number" value={p} onChange={e=>updateDist(i,e.target.value)}
                                        style={{ width:36, textAlign:"center", border:"none", background:"transparent", color:profile.color, fontWeight:800, fontSize:12, outline:"none" }} />
                                      <span style={{ fontSize:10, color:"#64748b", paddingRight:5 }}>%</span>
                                      <button onClick={()=>updateDist(i,p+1)} style={{ padding:"2px 7px", border:"none", background:"transparent", color:"#94a3b8", cursor:"pointer", fontSize:13 }}>+</button>
                                    </div>
                                  </div>
                                </div>
                                <input type="range" min={5} max={85} value={p} onChange={e=>updateDist(i,e.target.value)}
                                  style={{ width:"100%", accentColor:profile.color, cursor:"pointer" }} />
                              </div>
                            ))}
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                              <span style={{ fontSize:10, fontWeight:700, color: total===100 ? "#22c55e" : "#ef4444" }}>
                                {total===100 ? "✓ Suma: 100%" : `⚠️ Suma: ${total}%`}
                              </span>
                              <button onClick={()=>setCaloricDist(prev=>({...prev,[mealCount]:[...DEFAULT_DIST[mealCount]]}))}
                                style={{ fontSize:10, color:"#64748b", background:"none", border:"1px solid #30363d", borderRadius:5, padding:"2px 7px", cursor:"pointer" }}>↺ Domyślne</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ display:"flex", gap:5 }}>
                            {dist.map((p,i)=>(
                              <div key={i} style={{ flex:p, background:`${profile.color}18`, borderRadius:8, padding:"7px 3px", textAlign:"center", border:`1px solid ${profile.color}33` }}>
                                <div style={{ fontSize:13, fontWeight:800, color:profile.color }}>{p}%</div>
                                <div style={{ fontSize:9, color:"#64748b" }}>{names[i]}</div>
                                <div style={{ fontSize:9, color:"#374151" }}>~{Math.round(targetKcalDay*p/100)} kcal</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>

            {/* ROW 3: Clinical profile picker */}
            <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.06em" }}>Profil kliniczny pacjenta</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))", gap:12, marginBottom:24 }}>
              {Object.values(PATIENT_PROFILES).map(p=>(
                <div key={p.id} className="profile-card" onClick={()=>setProfileId(p.id)} style={{
                  ...S.card, padding:"16px", border:`2px solid ${profileId===p.id ? p.color : "#21262d"}`,
                  background: profileId===p.id ? `${p.color}11` : "#161b22"
                }}>
                  <div style={{ display:"flex", gap:10, marginBottom:8 }}>
                    <span style={{ fontSize:24 }}>{p.icon}</span>
                    <div>
                      <div style={{ fontWeight:700, fontSize:13, color: profileId===p.id ? p.color : "#e2e8f0" }}>{p.label}</div>
                      <div style={{ fontSize:10, color:"#64748b" }}>{p.description}</div>
                    </div>
                  </div>
                  {profileId===p.id && p.notes && (
                    <div style={{ fontSize:11, color:"#94a3b8", lineHeight:1.5, borderTop:`1px solid ${p.color}33`, paddingTop:8, marginTop:4 }}>{p.notes}</div>
                  )}
                  {p.prioritize && p.prioritize.length > 0 && (
                    <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:6 }}>
                      {p.prioritize.slice(0,4).map(k=>{
                        const n = ALL_NUTRIENTS.find(x=>x.key===k);
                        return n ? <span key={k} style={{ fontSize:9, padding:"1px 6px", borderRadius:10, background:`${p.color}22`, color:p.color, fontWeight:600 }}>↑{n.label}</span> : null;
                      })}
                    </div>
                  )}
                </div>
              ))}
            </div>

            <button onClick={()=>setPage("plan")} style={{
              padding:"14px 40px", borderRadius:12, border:"none", fontWeight:800, fontSize:15, cursor:"pointer",
              background:`linear-gradient(135deg,${profile.color},${profile.color}bb)`, color:"#fff"
            }}>
              Przejdź do planowania diety →
            </button>
          </div>
        )}

        {/* ══════════════════ PAGE: PLAN ══════════════════ */}
        {page === "plan" && (
          <div className="fade-in">
            {/* Patient badge */}
            <div style={{ display:"flex", gap:12, alignItems:"center", marginBottom:20, flexWrap:"wrap" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, background:`${profile.color}15`, border:`1px solid ${profile.color}44`, borderRadius:12, padding:"10px 16px" }}>
                <span style={{ fontSize:22 }}>{profile.icon}</span>
                <div>
                  <div style={{ fontWeight:700, fontSize:14, color:profile.color }}>{patientName || "Pacjent"}</div>
                  <div style={{ fontSize:11, color:"#94a3b8" }}>{profile.label} · {mealCount} posiłki/dzień</div>
                </div>
              </div>
              <div style={{ background:"#161b22", border:"1px solid #21262d", borderRadius:12, padding:"10px 14px" }}>
                <div style={{ fontSize:9, color:"#64748b", marginBottom:2 }}>{LIFESTYLE_OPTIONS[lifestyle].icon} Tryb życia</div>
                <div style={{ fontSize:11, fontWeight:700, color:"#cbd5e1" }}>{LIFESTYLE_OPTIONS[lifestyle].label}</div>
              </div>
              <div style={{ background:`${DIET_GOAL_MODIFIERS[dietGoal].color}15`, border:`1px solid ${DIET_GOAL_MODIFIERS[dietGoal].color}44`, borderRadius:12, padding:"10px 14px" }}>
                <div style={{ fontSize:9, color:"#64748b", marginBottom:2 }}>Cel diety</div>
                <div style={{ fontSize:11, fontWeight:700, color:DIET_GOAL_MODIFIERS[dietGoal].color }}>{DIET_GOAL_MODIFIERS[dietGoal].icon} {DIET_GOAL_MODIFIERS[dietGoal].label}</div>
              </div>
              <div style={{ background:"#161b22", border:"1px solid #21262d", borderRadius:12, padding:"10px 16px" }}>
                <div style={{ fontSize:10, color:"#64748b" }}>Cel kaloryczny</div>
                <div style={{ fontSize:18, fontWeight:800, color: customKcal !== null ? "#fbbf24" : "#f97316" }}>
                  {targetKcalDay} <span style={{ fontSize:11 }}>kcal</span>
                </div>
                <div style={{ fontSize:9, color:"#475569" }}>{customKcal !== null ? "✏️ ręcznie" : "🤖 AI"} · {DIET_GOAL_MODIFIERS[dietGoal].icon} {DIET_GOAL_MODIFIERS[dietGoal].label}</div>
              </div>
              {totalProteinTarget && (
                <div style={{ background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.3)", borderRadius:12, padding:"10px 16px" }}>
                  <div style={{ fontSize:10, color:"#64748b" }}>Cel białkowy</div>
                  <div style={{ fontSize:18, fontWeight:800, color:"#60a5fa" }}>
                    {totalProteinTarget}g <span style={{ fontSize:11 }}>białka</span>
                  </div>
                  <div style={{ fontSize:9, color:"#475569" }}>1,5g × {weight}kg = {totalProteinTarget}g/d</div>
                </div>
              )}
              <div style={{ background:"#161b22", border:"1px solid #21262d", borderRadius:12, padding:"10px 16px" }}>
                <div style={{ fontSize:10, color:"#64748b" }}>Spożyto dziś</div>
                <div style={{ fontSize:18, fontWeight:800, color: dayTotals.kcal > targetKcalDay*1.1 ? "#ef4444" : "#22c55e" }}>{dayTotals.kcal.toFixed(0)} <span style={{ fontSize:11 }}>kcal</span></div>
              </div>

              {/* Active warnings */}
              {activeWarnings.map(w => (
                <div key={w.key} style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.4)", borderRadius:12, padding:"10px 16px" }}>
                  <div style={{ fontSize:11, color:"#fca5a5", fontWeight:700 }}>🚨 {w.label}: {w.value.toFixed(0)} / {w.max}</div>
                </div>
              ))}
            </div>

            {/* Notes for profile */}
            {profile.notes && (
              <div style={{ background:`${profile.color}0d`, border:`1px solid ${profile.color}33`, borderRadius:12, padding:"12px 16px", marginBottom:20, fontSize:12, color:"#cbd5e1" }}>
                <span style={{ fontWeight:700, color:profile.color }}>💡 Wskazówki kliniczne: </span>{profile.notes}
              </div>
            )}

            {/* Meal grid */}
            <div style={{ display:"grid", gridTemplateColumns: mealCount===3 ? "repeat(3,1fr)" : "repeat(2,1fr)", gap:14 }}>
              {Array(mealCount).fill(null).map((_,i)=>{
                const targetPct = caloricDist[mealCount][i];
                const targetKcal = Math.round(targetKcalDay * targetPct / 100);
                const mealKcal = calcTotals(meals[i]).kcal;
                const pctUsed = targetKcal > 0 ? Math.min(100, mealKcal/targetKcal*100) : 0;
                const over = mealKcal > targetKcal * 1.1;
                return (
                  <div key={i}>
                    <div style={{ marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontSize:11, color:"#64748b" }}>Cel: <strong style={{ color: over ? "#ef4444" : "#94a3b8" }}>{targetKcal} kcal ({targetPct}%)</strong></span>
                      <span style={{ fontSize:10, color: over ? "#ef4444" : "#4ade80", fontWeight:700 }}>{mealKcal.toFixed(0)} kcal {over ? "↑" : ""}</span>
                    </div>
                    <div style={{ height:3, background:"#21262d", borderRadius:2, marginBottom:8, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${pctUsed}%`, background: over ? "#ef4444" : profile.color, borderRadius:2, transition:"width 0.3s" }} />
                    </div>
                    <MealSlot
                      name={mealNames[i]}
                      items={meals[i]}
                      onAdd={(food)=>addToMeal(i,food)}
                      onRemove={(foodId)=>removeFromMeal(i,foodId)}
                      onApplyAI={(food, grams)=>addToMealDirect(i, food, grams)}
                      gInput={gInputs[i]}
                      setGInput={(fn)=>setGInputs(p=>p.map((g,idx)=>idx===i?fn(g):g))}
                      search={searches[i]}
                      setSearch={(v)=>setSearches(p=>p.map((s,idx)=>idx===i?v:s))}
                      catFilter={catFilters[i]}
                      setCatFilter={(v)=>setCatFilters(p=>p.map((c,idx)=>idx===i?v:c))}
                      filteredFoods={getFilteredFoods(i)}
                      profile={profile}
                      targetKcal={targetKcal}
                      targetProtein={totalProteinTarget ? Math.round(totalProteinTarget * caloricDist[mealCount][i] / 100) : 0}
                      dietGoalLabel={DIET_GOAL_MODIFIERS[dietGoal]?.label}
                      lifestyleLabel={LIFESTYLE_OPTIONS[lifestyle]?.label}
                      activityLabel={ACTIVITY_FACTORS[activityLevel]?.label}
                      dietGoalLabel={DIET_GOAL_MODIFIERS[dietGoal].label}
                      lifestyleLabel={LIFESTYLE_OPTIONS[lifestyle].label}
                    />
                  </div>
                );
              })}
            </div>

            <button onClick={()=>setPage("report")} style={{
              marginTop:20, padding:"13px 36px", borderRadius:12, border:"none", fontWeight:800, fontSize:14, cursor:"pointer",
              background:`linear-gradient(135deg,${profile.color},${profile.color}aa)`, color:"#fff"
            }}>
              Zobacz raport dietetyczny →
            </button>
          </div>
        )}

        {/* ══════════════════ PAGE: REPORT ══════════════════ */}
        {page === "report" && (
          <div className="fade-in">
            <div style={{ marginBottom:20, display:"flex", gap:12, alignItems:"flex-start", flexWrap:"wrap" }}>
              <div>
                <div style={{ fontWeight:800, fontSize:22, color:"#f1f5f9" }}>📊 Raport dzienny</div>
                <div style={{ fontSize:12, color:"#64748b" }}>{patientName || "Pacjent"} · {profile.label}</div>
                <div style={{ display:"flex", gap:6, marginTop:6, flexWrap:"wrap" }}>
                  <span style={{ fontSize:10, padding:"2px 8px", borderRadius:10, background:`${DIET_GOAL_MODIFIERS[dietGoal].color}20`, color:DIET_GOAL_MODIFIERS[dietGoal].color, fontWeight:600 }}>
                    {DIET_GOAL_MODIFIERS[dietGoal].icon} {DIET_GOAL_MODIFIERS[dietGoal].label}
                  </span>
                  <span style={{ fontSize:10, padding:"2px 8px", borderRadius:10, background:"rgba(148,163,184,0.1)", color:"#94a3b8", fontWeight:600 }}>
                    {LIFESTYLE_OPTIONS[lifestyle].icon} {LIFESTYLE_OPTIONS[lifestyle].label}
                  </span>
                  <span style={{ fontSize:10, padding:"2px 8px", borderRadius:10, background:"rgba(148,163,184,0.1)", color:"#94a3b8", fontWeight:600 }}>
                    PAL {ACTIVITY_FACTORS[activityLevel].pal}
                  </span>
                  <span style={{ fontSize:10, padding:"2px 8px", borderRadius:10, background: customKcal ? "rgba(251,191,36,0.15)" : "rgba(34,197,94,0.15)", color: customKcal ? "#fbbf24" : "#22c55e", fontWeight:600 }}>
                    {customKcal ? "✏️" : "🤖"} {targetKcalDay} kcal/d
                  </span>
                </div>
              </div>
            </div>

            {/* Warning banner - clinical limits */}
            {activeWarnings.length > 0 && (
              <div style={{ background:"rgba(239,68,68,0.1)", border:"2px solid rgba(239,68,68,0.4)", borderRadius:12, padding:"14px 18px", marginBottom:20 }}>
                <div style={{ fontWeight:800, fontSize:14, color:"#ef4444", marginBottom:8 }}>🚨 Przekroczono limity bezpieczeństwa</div>
                {activeWarnings.map(w=>(
                  <div key={w.key} style={{ fontSize:13, color:"#fca5a5", marginBottom:3 }}>
                    • {w.label}: spożyto <strong>{w.value.toFixed(1)}</strong> / limit {w.max} {ALL_NUTRIENTS.find(n=>n.key===w.key)?.unit}
                    {" — "}{profile.limits?.[w.key]?.warn || "Przekroczono zalecany limit."}
                  </div>
                ))}
              </div>
            )}

            {/* Protein target banner */}
            {totalProteinTarget && (() => {
              const proteinPct = Math.round(dayTotals.protein / totalProteinTarget * 100);
              const proteinOk = dayTotals.protein >= totalProteinTarget * 0.9;
              return (
                <div style={{ background: proteinOk ? "rgba(59,130,246,0.08)" : "rgba(239,68,68,0.08)", border:`1px solid ${proteinOk ? "rgba(59,130,246,0.3)" : "rgba(239,68,68,0.3)"}`, borderRadius:12, padding:"12px 16px", marginBottom:20, display:"flex", alignItems:"center", gap:16, flexWrap:"wrap" }}>
                  <div style={{ flex:1, minWidth:180 }}>
                    <div style={{ fontWeight:700, fontSize:13, color: proteinOk ? "#60a5fa" : "#f87171", marginBottom:2 }}>
                      {proteinOk ? "✓ Cel białkowy osiągnięty" : "⚠️ Niedobór białka"}
                    </div>
                    <div style={{ fontSize:11, color:"#64748b" }}>
                      Wymóg: 1,5g × {weight}kg = <strong style={{ color:"#93c5fd" }}>{totalProteinTarget}g/dobę</strong>
                      {" · "}Spożyto: <strong style={{ color: proteinOk ? "#60a5fa" : "#f87171" }}>{dayTotals.protein.toFixed(1)}g</strong>
                      {" · "}<span style={{ color: proteinOk ? "#4ade80" : "#f87171", fontWeight:700 }}>{proteinPct}%</span>
                    </div>
                  </div>
                  <div style={{ minWidth:160 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#475569", marginBottom:3 }}>
                      <span>0g</span><span>{totalProteinTarget}g</span>
                    </div>
                    <div style={{ height:6, background:"#21262d", borderRadius:3, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${Math.min(100, proteinPct)}%`, background: proteinOk ? "linear-gradient(90deg,#3b82f6,#2563eb)" : "linear-gradient(90deg,#ef4444,#dc2626)", borderRadius:3, transition:"width 0.4s" }} />
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Summary cards */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:10, marginBottom:20 }}>
              {[
                {k:"kcal",l:"Kalorie",c:"#f97316",u:"kcal"},
                {k:"protein",l:"Białko",c:"#3b82f6",u:"g"},
                {k:"fat",l:"Tłuszcz",c:"#eab308",u:"g"},
                {k:"carbs",l:"Węglowodany",c:"#22c55e",u:"g"},
                {k:"fiber",l:"Błonnik",c:"#84cc16",u:"g"},
                {k:"sugar",l:"Cukry",c:"#f43f5e",u:"g"},
              ].map(n=>{
                const isKcal = n.k === "kcal";
                const isProtein = n.k === "protein";
                const rda = isKcal ? targetKcalDay : isProtein && totalProteinTarget ? totalProteinTarget : profile.rrdi[n.k];
                const pct = rda ? Math.round(dayTotals[n.k]/rda*100) : null;
                const over = pct && pct > 110;
                const under = isProtein && totalProteinTarget && dayTotals[n.k] < totalProteinTarget * 0.9;
                const warn = profile.warningNutrients?.[n.k] && dayTotals[n.k] > profile.warningNutrients[n.k].max;
                return (
                  <div key={n.k} style={{ ...S.card, padding:12,
                    border:`1px solid ${warn ? "#ef444466" : under ? "#ef444455" : isProtein && pct >= 90 ? "#3b82f644" : "#21262d"}`,
                    background: warn || under ? "rgba(239,68,68,0.07)" : isProtein && pct >= 90 ? "rgba(59,130,246,0.06)" : "#161b22"
                  }}>
                    <div style={{ fontSize:10, color:"#64748b", marginBottom:4 }}>{n.l}</div>
                    <div style={{ fontSize:22, fontWeight:800, color: warn || under ? "#ef4444" : n.c }}>{dayTotals[n.k].toFixed(n.k==="kcal"?0:1)}</div>
                    <div style={{ fontSize:10, color:"#475569" }}>{n.u}</div>
                    {isProtein && totalProteinTarget && (
                      <>
                        <div style={{ fontSize:10, color:"#475569", marginTop:1 }}>cel: {totalProteinTarget}g (1,5g/kg)</div>
                        <div style={{ height:3, background:"#21262d", borderRadius:2, margin:"4px 0", overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${Math.min(100, dayTotals[n.k]/totalProteinTarget*100)}%`, background: under ? "#ef4444" : "#3b82f6", borderRadius:2 }} />
                        </div>
                      </>
                    )}
                    {pct !== null && (
                      <div style={{ fontSize:10, fontWeight:700, color: under ? "#ef4444" : over ? "#f97316" : "#64748b", marginTop:1 }}>
                        {pct}% {isProtein && totalProteinTarget ? "celu" : "RDA"} {under ? "⚠️" : pct >= 90 && isProtein ? "✓" : ""}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Per-meal breakdown */}
            <div style={{ ...S.card, padding:18, marginBottom:20 }}>
              <div style={{ fontWeight:700, fontSize:13, color:"#94a3b8", marginBottom:14, textTransform:"uppercase", letterSpacing:"0.06em", fontSize:11 }}>Podział na posiłki</div>
              <div style={{ display:"grid", gridTemplateColumns:`repeat(${mealCount},1fr)`, gap:10 }}>
                {activeMeals.map((items,i)=>{
                  const t = calcTotals(items);
                  const targetPct = caloricDist[mealCount][i];
                  const targetKcal = Math.round(targetKcalDay * targetPct / 100);
                  const mealProteinTarget = totalProteinTarget ? Math.round(totalProteinTarget * targetPct / 100) : null;
                  const pctUsed = Math.min(110, t.kcal / targetKcal * 100);
                  const over = t.kcal > targetKcal * 1.1;
                  const proteinMet = mealProteinTarget ? t.protein >= mealProteinTarget * 0.9 : true;
                  return (
                    <div key={i} style={{ background:"#0d1117", borderRadius:10, padding:"12px", border:`1px solid ${over ? "#ef444433" : !proteinMet && items.length > 0 ? "#3b82f633" : "#21262d"}` }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:2 }}>
                        <div style={{ fontWeight:700, fontSize:13, color:"#f1f5f9" }}>{mealNames[i]}</div>
                        <div style={{ fontSize:9, color:"#475569" }}>{targetPct}% planu</div>
                      </div>
                      <div style={{ fontSize:20, fontWeight:800, color: over ? "#ef4444" : "#f97316", marginBottom:2 }}>{t.kcal.toFixed(0)} kcal</div>
                      <div style={{ fontSize:10, color:"#475569", marginBottom:4 }}>
                        cel: {targetKcal} kcal · {over ? <span style={{ color:"#ef4444" }}>↑{(t.kcal - targetKcal).toFixed(0)} kcal</span> : `${(targetKcal - t.kcal).toFixed(0)} do celu`}
                      </div>
                      <div style={{ height:4, background:"#21262d", borderRadius:2, marginBottom:8, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:`${pctUsed}%`, background: over ? "#ef4444" : t.kcal >= targetKcal*0.9 ? "#22c55e" : profile.color, borderRadius:2, transition:"width 0.4s" }} />
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
                        {mealProteinTarget && (
                          <div>
                            <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:2 }}>
                              <span style={{ color: !proteinMet && items.length > 0 ? "#f87171" : "#64748b" }}>Białko {!proteinMet && items.length > 0 ? "⚠️" : proteinMet && items.length > 0 ? "✓" : ""}</span>
                              <span style={{ color: proteinMet && items.length > 0 ? "#60a5fa" : "#f87171", fontWeight:700 }}>{t.protein.toFixed(1)}g / {mealProteinTarget}g</span>
                            </div>
                            <div style={{ height:3, background:"#21262d", borderRadius:2, marginBottom:4, overflow:"hidden" }}>
                              <div style={{ height:"100%", width:`${Math.min(100,t.protein/mealProteinTarget*100)}%`, background: proteinMet ? "#3b82f6" : "#ef4444", borderRadius:2 }} />
                            </div>
                          </div>
                        )}
                        {[{l:"Tłuszcz",v:t.fat,c:"#facc15"},{l:"Węglowodany",v:t.carbs,c:"#4ade80"}].map(m=>(
                          <div key={m.l} style={{ display:"flex", justifyContent:"space-between", fontSize:11 }}>
                            <span style={{ color:"#64748b" }}>{m.l}</span>
                            <span style={{ color:m.c, fontWeight:700 }}>{m.v.toFixed(1)}g</span>
                          </div>
                        ))}
                      </div>
                      {items.length === 0 && <div style={{ fontSize:10, color:"#374151", marginTop:4 }}>Brak produktów</div>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Detailed nutrient report */}
            <div style={{ ...S.card, padding:18 }}>
              <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
                <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.06em", marginRight:"auto", alignSelf:"center" }}>Szczegóły odżywcze</div>
                {["Makro","Minerały","Witaminy"].map(g=>(
                  <button key={g} onClick={()=>setReportTab(g)} style={{
                    padding:"6px 14px", borderRadius:8, border:"none", cursor:"pointer", fontSize:12, fontWeight:600,
                    background: reportTab===g ? COLORS[g] + "33" : "#21262d",
                    color: reportTab===g ? COLORS[g] : "#64748b"
                  }}>{g}</button>
                ))}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap: "4px 24px" }}>
                {ALL_NUTRIENTS.filter(n=>n.group===reportTab).map(n=>{
                  const rda = profile.rrdi[n.key];
                  const isWarn = profile.warningNutrients?.[n.key] && dayTotals[n.key] > profile.warningNutrients[n.key].max;
                  const isPri = profile.prioritize?.includes(n.key);
                  return (
                    <NutrientBar key={n.key} label={n.label} value={dayTotals[n.key]} rda={rda} unit={n.unit}
                      color={N_COLORS[n.key] || "#64748b"} isWarning={isWarn} isPriority={isPri} />
                  );
                })}
              </div>
            </div>

            {/* Clinical recommendations */}
            {(profile.prioritize?.length > 0 || Object.keys(profile.warningNutrients||{}).length > 0) && (
              <div style={{ ...S.card, padding:18, marginTop:16 }}>
                <div style={{ fontWeight:700, fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:12 }}>Zalecenia kliniczne</div>
                {profile.prioritize?.length > 0 && (
                  <div style={{ marginBottom:10 }}>
                    <div style={{ fontSize:12, color:"#fbbf24", fontWeight:700, marginBottom:6 }}>⭐ Składniki priorytetowe dla {profile.label}:</div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {profile.prioritize.map(k=>{
                        const n = ALL_NUTRIENTS.find(x=>x.key===k);
                        if (!n) return null;
                        const val = dayTotals[k];
                        const rda = profile.rrdi[k];
                        const pct = rda ? Math.round(val/rda*100) : null;
                        return (
                          <div key={k} style={{ background:"rgba(251,191,36,0.1)", border:"1px solid rgba(251,191,36,0.3)", borderRadius:9, padding:"8px 12px", minWidth:100 }}>
                            <div style={{ fontSize:11, color:"#fbbf24", fontWeight:700 }}>{n.label}</div>
                            <div style={{ fontSize:14, fontWeight:800, color:"#e2e8f0" }}>{val.toFixed(1)} {n.unit}</div>
                            {pct !== null && <div style={{ fontSize:10, color: pct >= 80 ? "#4ade80" : "#f87171" }}>{pct}% RDA {pct < 80 ? "⚠️" : "✓"}</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                <div style={{ fontSize:12, color:"#94a3b8", background:"#0d1117", borderRadius:9, padding:"10px 12px", lineHeight:1.6 }}>
                  <strong style={{ color: profile.color }}>📋 Nota kliniczna:</strong> {profile.notes}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
